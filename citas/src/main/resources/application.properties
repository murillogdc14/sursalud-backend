# ── Servidor ──────────────────────────────────────────────
server.port=${PORT:8080}

# ── Base de datos ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/sursalud_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Swagger UI ─────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Nombre de la app ───────────────────────────────────────
spring.application.name=Sistema de Citas Medicas - Sur Salud